<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline-variant": "#d0c5af",
              "surface-tint": "#735c00",
              "surface-container-lowest": "#ffffff",
              "primary": "#735c00",
              "on-tertiary-fixed-variant": "#474747",
              "surface-container": "#efeeec",
              "on-secondary-fixed-variant": "#464747",
              "outline": "#7f7663",
              "on-primary-fixed": "#241a00",
              "on-surface-variant": "#4d4635",
              "surface-container-high": "#e9e8e6",
              "primary-container": "#d4af37",
              "on-secondary-container": "#626363",
              "surface-bright": "#faf9f7",
              "inverse-surface": "#2f3130",
              "surface": "#faf9f7",
              "background": "#faf9f7",
              "surface-container-low": "#f4f3f1",
              "on-surface": "#1a1c1b",
              "on-primary": "#ffffff",
              "secondary": "#5d5e5f",
              "secondary-container": "#e0dfdf",
              "on-background": "#1a1c1b"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen">
<main class="pt-32 pb-10 max-w-[1440px] mx-auto px-6 md:px-20">
<section class="mb-8">
<a class="inline-flex items-center gap-2 text-[10px] uppercase tracking-[0.2em] text-outline hover:text-primary transition-colors" href="/community">
<span class="material-symbols-outlined text-base">arrow_back</span>
목록
</a>
</section>

<section class="max-w-4xl mx-auto">
<article class="bg-surface-container-lowest rounded-[2rem] shadow-[0_30px_70px_rgba(26,28,27,0.05)] p-8 md:p-12">
<div class="flex flex-col gap-6 md:flex-row md:items-start md:justify-between">
<div class="min-w-0">
<div class="flex flex-wrap items-center gap-3 mb-6">
{{CATEGORY_BADGE}}
</div>
<h1 class="font-headline text-4xl md:text-6xl leading-[1.15] tracking-tight text-on-surface">{{TITLE}}</h1>
{{OWNER_ACTIONS}}
</div>
<div class="shrink-0 flex flex-wrap items-center gap-x-3 gap-y-2 md:max-w-[260px] md:justify-end text-[11px] uppercase tracking-[0.16em] text-outline">
<span>{{AUTHOR}}</span>
<span>{{DATE}}</span>
<span>조회 {{VIEWS}}</span>
<span>댓글 {{COMMENTS}}</span>
</div>
</div>

<div class="mt-12 space-y-7">
{{BODY_HTML}}
</div>
</article>
</section>

<section class="max-w-4xl mx-auto mt-10">
<div class="rounded-[1.5rem] bg-surface-container-lowest border border-outline-variant/20 p-6 md:p-8">
<div class="flex items-center justify-between gap-4 mb-4">
<h2 class="font-headline text-2xl text-on-surface">댓글</h2>
</div>
<form class="space-y-3 mb-6" data-comment-form="" data-post-id="{{POST_ID}}">
<label class="block">
<span class="sr-only">댓글 내용</span>
<textarea class="w-full min-h-[120px] rounded-[1.25rem] border border-outline-variant/30 bg-surface-container-low px-4 py-4 text-sm leading-7 text-on-surface placeholder:text-outline focus:border-primary focus:ring-0 resize-y" data-comment-body="" placeholder="댓글을 남겨보세요"></textarea>
</label>
<div class="flex items-center justify-end gap-3">
<button class="inline-flex items-center justify-center rounded-full bg-primary px-5 py-2.5 text-[10px] font-label uppercase tracking-[0.2em] text-on-primary disabled:opacity-60" data-comment-submit="" type="submit">남기기</button>
</div>
<p class="hidden rounded-xl border px-4 py-3 text-sm" data-comment-message=""></p>
</form>
<div class="divide-y divide-outline-variant/10" data-comment-list="">
{{COMMENT_ITEMS}}
</div>
</div>
</section>

<section class="mt-16 rounded-[2rem] bg-surface-container-low p-8 md:p-12 max-w-5xl mx-auto">
<div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4">
<div>
<span class="block text-[10px] uppercase tracking-[0.2em] text-outline mb-3">이어 읽기</span>
<h2 class="font-headline text-3xl md:text-4xl tracking-tight text-on-surface">다른 글</h2>
</div>
<a class="inline-flex items-center gap-2 text-[10px] uppercase tracking-[0.2em] text-primary border-b border-primary/30 pb-1 hover:border-primary transition-colors" href="/community">
전체 글
<span class="material-symbols-outlined text-base">arrow_forward</span>
</a>
</div>
<div class="mt-8 grid md:grid-cols-2 gap-4">
{{RELATED_POSTS}}
</div>
</section>
</main>
</body></html>
