<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>은금슬쩍 | 커뮤니티</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline-variant": "#d0c5af",
              "surface-tint": "#735c00",
              "surface-container-lowest": "#ffffff",
              "primary": "#735c00",
              "on-tertiary-fixed-variant": "#474747",
              "surface-container": "#efeeec",
              "on-secondary-fixed-variant": "#464747",
              "outline": "#7f7663",
              "on-primary-fixed": "#241a00",
              "on-surface-variant": "#4d4635",
              "surface-container-high": "#e9e8e6",
              "primary-container": "#d4af37",
              "on-secondary-container": "#626363",
              "surface-bright": "#faf9f7",
              "inverse-primary": "#e9c349",
              "on-error": "#ffffff",
              "on-secondary": "#ffffff",
              "surface-dim": "#dadad8",
              "tertiary-fixed-dim": "#c8c6c5",
              "surface": "#faf9f7",
              "inverse-surface": "#2f3130",
              "background": "#faf9f7",
              "surface-container-low": "#f4f3f1",
              "on-tertiary-fixed": "#1b1c1c",
              "on-tertiary-container": "#454545",
              "on-secondary-fixed": "#1a1c1c",
              "on-surface": "#1a1c1b",
              "on-primary-container": "#554300",
              "surface-variant": "#e3e2e0",
              "error": "#ba1a1a",
              "inverse-on-surface": "#f1f1ef",
              "tertiary-fixed": "#e4e2e1",
              "on-primary-fixed-variant": "#574500",
              "secondary-fixed-dim": "#c6c6c6",
              "error-container": "#ffdad6",
              "tertiary": "#5f5e5e",
              "surface-container-highest": "#e3e2e0",
              "on-primary": "#ffffff",
              "primary-fixed": "#ffe088",
              "on-error-container": "#93000a",
              "tertiary-container": "#b4b2b2",
              "secondary-fixed": "#e3e2e2",
              "secondary": "#5d5e5f",
              "secondary-container": "#e0dfdf",
              "on-tertiary": "#ffffff",
              "on-background": "#1a1c1b",
              "primary-fixed-dim": "#e9c349"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #faf9f7;
            color: #1a1c1b;
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3, .serif {
            font-family: 'Noto Serif', serif;
        }
        [data-auth-member] {
            display: none;
        }
        body.is-logged-in [data-auth-guest] {
            display: none !important;
        }
        body.is-logged-in [data-auth-member] {
            display: inline-flex !important;
        }
        .community-filter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.25rem;
            border-radius: 9999px;
            border: 1px solid rgba(175, 179, 174, 0.2);
            background: #edeeea;
            color: #2f3430;
            font-size: 0.875rem;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }
        .community-filter:hover {
            border-color: #5f5e5e;
        }
        .community-filter.is-active {
            background: #5f5e5e;
            border-color: #5f5e5e;
            color: #ffffff;
        }
        .community-page-size-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 2.75rem;
            height: 2.5rem;
            padding: 0 0.9rem;
            border-radius: 9999px;
            border: 1px solid rgba(127, 118, 99, 0.18);
            transition: all 0.2s ease;
            color: #4d4635;
            background: rgba(255, 255, 255, 0.72);
            font-size: 0.75rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }
        .community-page-size-button.is-active {
            background: #735c00;
            color: #ffffff;
            border-color: #735c00;
            box-shadow: 0 10px 25px rgba(115, 92, 0, 0.18);
        }
        [data-community-empty][hidden] {
            display: none !important;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#faf9f7] dark:bg-[#1a1c1b] opacity-80 backdrop-blur-xl">
<div class="flex justify-between items-center px-10 py-6 max-w-[1440px] mx-auto w-full">
<a class="font-serif text-2xl tracking-tighter text-[#1a1c1b] dark:text-[#faf9f7]" href="/">은금슬쩍</a>
<nav class="flex md:hidden items-center gap-5">
<a class="text-[#735c00] dark:text-[#d4af37] border-b border-[#735c00] dark:border-[#d4af37] pb-1 font-medium text-[11px] tracking-[0.18em] uppercase" href="/community">커뮤니티</a>
<a class="text-[#1a1c1b] dark:text-[#faf9f7] opacity-70 hover:opacity-100 transition-opacity hover:text-[#735c00] dark:hover:text-[#d4af37] font-medium text-[11px] tracking-[0.18em] uppercase" href="/market">공방 공유</a>
</nav>
<div class="md:hidden flex items-center">
<a class="inline-flex items-center justify-center px-4 py-2 rounded-full border border-outline text-[10px] font-label tracking-[0.18em] uppercase text-on-surface whitespace-nowrap" data-auth-guest="" href="#">로그인</a>
<a class="items-center justify-center px-4 py-2 rounded-full border border-primary bg-primary text-[10px] font-label tracking-[0.18em] uppercase text-white whitespace-nowrap" data-auth-member="" href="#">마이페이지</a>
</div>
<nav class="hidden md:flex gap-12">
<a class="font-sans text-xs uppercase tracking-widest text-[#735c00] dark:text-[#d4af37] border-b border-[#d4af37] pb-1" href="/community">커뮤니티</a>
<a class="font-sans text-xs uppercase tracking-widest text-[#1a1c1b] dark:text-[#faf9f7] opacity-60 hover:opacity-100 transition-opacity" href="/market">공방 공유</a>
<a class="font-sans text-xs uppercase tracking-widest text-[#1a1c1b] dark:text-[#faf9f7] opacity-60 hover:opacity-100 transition-opacity" href="#">마이 페이지</a>
</nav>
<div class="hidden md:flex items-center gap-6">
<button class="text-[#1a1c1b] dark:text-[#faf9f7] hover:scale-95 duration-200 ease-in-out">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
<button class="text-[#1a1c1b] dark:text-[#faf9f7] hover:scale-95 duration-200 ease-in-out">
<span class="material-symbols-outlined" data-icon="shopping_bag">shopping_bag</span>
</button>
</div>
</div>
<div class="bg-[#f4f3f1] dark:bg-[#2a2c2b] h-[1px] w-full"></div>
</header>
<main class="pt-32 pb-20 max-w-[1440px] mx-auto px-6 md:px-20">
<!-- Page Header & Filters -->
<section class="mb-16">
<div class="flex flex-col md:flex-row md:items-end justify-between gap-8">
<div class="max-w-2xl">
<h1 class="text-6xl md:text-8xl font-headline tracking-tighter mb-6">커뮤니티</h1>
<p class="text-outline font-body text-lg max-w-lg leading-relaxed">가볍게 묻고, 나누고, 사고팔아요.</p>
</div>
<div class="flex flex-col md:items-end gap-4 w-full md:w-auto">
<div class="flex flex-wrap gap-3">
{{CATEGORY_FILTERS}}
</div>
<div class="flex flex-col items-stretch sm:items-end gap-4 w-full md:w-auto">
<form action="/community" class="flex flex-col sm:flex-row gap-4 w-full md:w-auto" method="get">
<input name="category" type="hidden" value="{{CURRENT_CATEGORY}}"/>
<input name="page" type="hidden" value="1"/>
<input name="pageSize" type="hidden" value="{{CURRENT_PAGE_SIZE}}"/>
<div class="relative group w-full md:w-72">
<input class="w-full bg-surface-container-low border-none rounded-full px-8 py-3 pr-12 text-sm font-label focus:ring-1 focus:ring-primary-container transition-all" name="q" placeholder="찾고 싶은 글" type="text" value="{{SEARCH_VALUE}}"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline text-sm hover:text-primary transition-colors" type="submit">
<span class="material-symbols-outlined">search</span>
</button>
</div>
<a class="inline-flex items-center justify-center px-8 py-3 rounded-full bg-gradient-to-r from-primary to-primary-container text-white text-sm font-label tracking-widest uppercase shadow-lg shadow-primary/10 hover:opacity-95 transition-all" href="/community/new">글쓰기</a>
</form>
<div class="flex items-center justify-end gap-2">
{{PAGE_SIZE_BUTTONS}}
</div>
</div>
</div>
</div>
</section>
<!-- Community Feed -->
<section class="max-w-4xl mx-auto">
<div class="space-y-4">
{{COMMUNITY_POST_ROWS}}
</div>
{{EMPTY_STATE}}
</section>
<!-- Pagination -->
<div class="mt-16 flex items-center justify-center gap-2 flex-wrap">
{{PAGINATION_BAR}}
</div>
</main>
<!-- Footer -->
<footer class="w-full border-t border-[#d0c5af]/20 bg-[#f4f3f1] dark:bg-[#121413]">
<div class="flex flex-col md:flex-row justify-between items-center px-20 py-16 w-full mt-20 gap-8 max-w-[1440px] mx-auto">
<div class="font-serif text-lg text-[#1a1c1b] dark:text-[#faf9f7]">은금슬쩍</div>
<div class="flex gap-10">
<a class="font-sans text-[10px] tracking-[0.2em] uppercase text-[#7f7663] hover:text-[#1a1c1b] dark:hover:text-white underline decoration-[#d4af37] underline-offset-4 transition-all" href="#">저널</a>
<a class="font-sans text-[10px] tracking-[0.2em] uppercase text-[#7f7663] hover:text-[#1a1c1b] dark:hover:text-white underline decoration-[#d4af37] underline-offset-4 transition-all" href="#">작가들</a>
<a class="font-sans text-[10px] tracking-[0.2em] uppercase text-[#7f7663] hover:text-[#1a1c1b] dark:hover:text-white underline decoration-[#d4af37] underline-offset-4 transition-all" href="#">배송 정보</a>
<a class="font-sans text-[10px] tracking-[0.2em] uppercase text-[#7f7663] hover:text-[#1a1c1b] dark:hover:text-white underline decoration-[#d4af37] underline-offset-4 transition-all" href="#">법적 고지</a>
</div>
<p class="font-sans text-[10px] tracking-[0.2em] uppercase text-[#7f7663]">© 2024 은금슬쩍. 큐레이션 아틀리에.</p>
</div>
</footer>
<!-- Floating Action Button for community engagement -->
<div class="fixed bottom-10 right-10 z-50">
<button class="w-16 h-16 rounded-full bg-primary shadow-xl flex items-center justify-center text-white hover:scale-110 transition-transform active:scale-95 group">
<span class="material-symbols-outlined text-2xl" data-icon="edit">edit</span>
<span class="absolute right-full mr-4 px-4 py-2 bg-on-surface text-surface text-[10px] font-label uppercase tracking-widest rounded-lg opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">글쓰기</span>
</button>
</div>
</body></html>
