<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline-variant": "#d0c5af",
              "primary": "#735c00",
              "primary-container": "#d4af37",
              "surface": "#faf9f7",
              "surface-container-low": "#f4f3f1",
              "surface-container-lowest": "#ffffff",
              "on-surface": "#1a1c1b",
              "on-surface-variant": "#4d4635",
              "outline": "#7f7663"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Inter"],
              "label": ["Inter"]
            }
          }
        }
      }
    </script>
</head>
<body class="bg-surface text-on-surface font-body" data-auth-required="true" data-account-page="true">
<main class="min-h-screen px-6 md:px-20 pt-32 md:pt-40 pb-20">
<section class="max-w-[960px] mx-auto grid grid-cols-1 lg:grid-cols-[1.1fr_0.9fr] gap-8">
<div class="rounded-[2rem] border border-[#d0c5af]/30 bg-white shadow-[0_30px_70px_rgba(26,28,27,0.06)] p-8 md:p-12">
<span class="text-[10px] tracking-[0.22em] uppercase text-outline">계정 정보</span>
<h1 class="mt-4 font-headline text-3xl md:text-5xl tracking-tight leading-tight" data-auth-display-name="" data-account-name="">은금슬쩍 회원</h1>
<p class="mt-5 text-sm md:text-base text-on-surface-variant leading-relaxed">
        현재 계정 상태를 확인하고 로그아웃하거나, 필요 시 탈퇴를 진행할 수 있습니다.
      </p>
<div data-account-message="" hidden=""></div>
<dl class="mt-8 grid grid-cols-1 sm:grid-cols-3 gap-4">
<div class="rounded-[1.5rem] bg-surface-container-low p-5">
<dt class="text-[10px] uppercase tracking-[0.18em] text-outline">상태</dt>
<dd class="mt-3 text-lg font-semibold" data-account-status="">-</dd>
</div>
<div class="rounded-[1.5rem] bg-surface-container-low p-5">
<dt class="text-[10px] uppercase tracking-[0.18em] text-outline">권한</dt>
<dd class="mt-3 text-lg font-semibold" data-account-role="">-</dd>
</div>
<div class="rounded-[1.5rem] bg-surface-container-low p-5">
<dt class="text-[10px] uppercase tracking-[0.18em] text-outline">추가 정보</dt>
<dd class="mt-3 text-lg font-semibold" data-account-onboarding="">-</dd>
</div>
</dl>
</div>
<aside class="rounded-[2rem] border border-[#d0c5af]/30 bg-white shadow-[0_30px_70px_rgba(26,28,27,0.06)] p-8 md:p-12">
<span class="text-[10px] tracking-[0.22em] uppercase text-outline">계정 작업</span>
<div class="mt-6 space-y-4">
<button class="flex w-full items-center justify-center rounded-full bg-gradient-to-r from-primary to-primary-container px-6 py-4 text-xs font-semibold uppercase tracking-[0.22em] text-white shadow-lg shadow-primary/15 transition-transform hover:scale-[0.99]" data-account-logout="" type="button">로그아웃</button>
<button class="flex w-full items-center justify-center rounded-full border border-[#d0c5af] px-6 py-4 text-xs font-semibold uppercase tracking-[0.22em] text-on-surface transition-colors hover:bg-surface-container-low" data-account-delete="" type="button">탈퇴하기</button>
</div>
<p class="mt-5 text-xs leading-6 text-on-surface-variant">
        탈퇴 시 계정 상태는 soft delete로 전환됩니다.
        동일 공급자 계정으로 다시 로그인하더라도 자동 복구하지 않도록 설계되어 있습니다.
      </p>
</aside>
</section>
</main>
</body></html>
