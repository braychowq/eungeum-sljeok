<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline-variant": "#d0c5af",
              "primary": "#735c00",
              "primary-container": "#d4af37",
              "surface": "#faf9f7",
              "surface-container-low": "#f4f3f1",
              "surface-container-lowest": "#ffffff",
              "on-surface": "#1a1c1b",
              "on-surface-variant": "#4d4635",
              "outline": "#7f7663"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Inter"],
              "label": ["Inter"]
            }
          }
        }
      }
    </script>
</head>
<body class="bg-surface text-on-surface font-body" data-auth-required="true" data-onboarding-page="true">
<main class="min-h-screen px-6 md:px-20 pt-32 md:pt-40 pb-20">
<section class="max-w-[860px] mx-auto rounded-[2rem] border border-[#d0c5af]/30 bg-white shadow-[0_30px_70px_rgba(26,28,27,0.06)] p-8 md:p-12">
<div class="max-w-2xl">
<span class="text-[10px] tracking-[0.22em] uppercase text-outline">First time setup</span>
<h1 class="mt-4 font-headline text-3xl md:text-5xl tracking-tight leading-tight">추가 정보를 한 번만 알려주세요.</h1>
<p class="mt-5 text-sm md:text-base text-on-surface-variant leading-relaxed">
        최초 1회만 닉네임과 활동 정보를 받습니다.
        이후에는 같은 네이버/카카오 계정으로 로그인할 때 기존 계정으로 바로 연결됩니다.
      </p>
</div>
<form class="mt-10 space-y-6" data-onboarding-form="">
<div class="grid grid-cols-1 md:grid-cols-2 gap-5">
<label class="block">
<span class="block mb-3 text-[10px] tracking-[0.18em] uppercase text-outline">닉네임</span>
<input class="w-full rounded-2xl border border-[#d0c5af]/40 bg-surface px-5 py-4 text-sm focus:border-primary focus:ring-0" name="displayName" placeholder="예: 구름실버" type="text"/>
</label>
<label class="block">
<span class="block mb-3 text-[10px] tracking-[0.18em] uppercase text-outline">활동 분야</span>
<select class="w-full rounded-2xl border border-[#d0c5af]/40 bg-surface px-5 py-4 text-sm focus:border-primary focus:ring-0" name="activityField">
<option value="">선택해주세요</option>
<option value="주얼리 디자이너">주얼리 디자이너</option>
<option value="공방 운영">공방 운영</option>
<option value="취미 제작">취미 제작</option>
<option value="소재/장비 판매">소재/장비 판매</option>
</select>
</label>
</div>
<label class="block">
<span class="block mb-3 text-[10px] tracking-[0.18em] uppercase text-outline">지역</span>
<input class="w-full rounded-2xl border border-[#d0c5af]/40 bg-surface px-5 py-4 text-sm focus:border-primary focus:ring-0" name="region" placeholder="예: 서울 종로구" type="text"/>
</label>
<div class="rounded-[1.5rem] bg-surface-container-low p-5 space-y-4">
<label class="flex items-start gap-3 text-sm text-on-surface-variant leading-6">
<input class="mt-1 rounded border-[#d0c5af] text-primary focus:ring-primary/20" name="agreedTerms" type="checkbox"/>
<span>(필수) 서비스 이용약관에 동의합니다.</span>
</label>
<label class="flex items-start gap-3 text-sm text-on-surface-variant leading-6">
<input class="mt-1 rounded border-[#d0c5af] text-primary focus:ring-primary/20" name="agreedPrivacy" type="checkbox"/>
<span>(필수) 개인정보 처리방침에 동의합니다.</span>
</label>
<label class="flex items-start gap-3 text-sm text-on-surface-variant leading-6">
<input class="mt-1 rounded border-[#d0c5af] text-primary focus:ring-primary/20" name="marketingOptIn" type="checkbox"/>
<span>(선택) 새로운 공방/커뮤니티 소식을 받아보겠습니다.</span>
</label>
</div>
<div data-onboarding-message="" hidden=""></div>
<div class="flex justify-end">
<button class="inline-flex items-center justify-center rounded-full bg-gradient-to-r from-primary to-primary-container px-8 py-4 text-xs font-semibold uppercase tracking-[0.22em] text-white shadow-lg shadow-primary/15 transition-transform hover:scale-[0.99]" data-onboarding-submit="" type="submit">정보 저장하기</button>
</div>
</form>
</section>
</main>
</body></html>
