<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline-variant": "#d0c5af",
              "surface-tint": "#735c00",
              "surface-container-lowest": "#ffffff",
              "primary": "#735c00",
              "surface-container": "#efeeec",
              "outline": "#7f7663",
              "on-surface-variant": "#4d4635",
              "surface-container-high": "#e9e8e6",
              "primary-container": "#d4af37",
              "surface-bright": "#faf9f7",
              "surface": "#faf9f7",
              "background": "#faf9f7",
              "surface-container-low": "#f4f3f1",
              "on-surface": "#1a1c1b",
              "on-primary-container": "#554300",
              "surface-variant": "#e3e2e0",
              "tertiary": "#5f5e5e",
              "surface-container-highest": "#e3e2e0",
              "on-primary": "#ffffff",
              "secondary": "#5d5e5f",
              "secondary-container": "#e0dfdf",
              "on-background": "#1a1c1b"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container" data-login-page="true">
<main class="min-h-screen px-6 md:px-20 pt-24 md:pt-32 pb-20">
<section class="max-w-[460px] mx-auto">
<div class="rounded-[1.75rem] bg-surface-container-lowest border border-outline-variant/15 shadow-[0_18px_40px_rgba(26,28,27,0.05)] p-7 md:p-10">
<div class="max-w-md mx-auto space-y-5">
{{LOGIN_FEEDBACK}}
<div class="space-y-1 text-center">
<p class="text-sm text-on-surface-variant">네이버나 카카오로 이어서 들어오세요.</p>
</div>
<div class="space-y-4">
<a class="flex items-center justify-between rounded-[1.35rem] border border-[#03c75a]/20 bg-[#03c75a] px-5 py-4 text-white transition-transform hover:scale-[0.995]" href="{{NAVER_START_URL}}">
<div>
<div class="text-[10px] uppercase tracking-[0.18em] text-white/75">NAVER</div>
<div class="mt-1.5 text-base font-semibold">네이버로 계속하기</div>
</div>
<div class="h-10 w-10 rounded-full bg-white/15 flex items-center justify-center text-base font-semibold">N</div>
</a>
<a class="flex items-center justify-between rounded-[1.35rem] border border-[#fee500]/40 bg-[#fee500] px-5 py-4 text-[#191600] transition-transform hover:scale-[0.995]" href="{{KAKAO_START_URL}}">
<div>
<div class="text-[10px] uppercase tracking-[0.18em] text-[#191600]/70">KAKAO</div>
<div class="mt-1.5 text-base font-semibold">카카오로 계속하기</div>
</div>
<div class="h-10 w-10 rounded-full bg-black/5 flex items-center justify-center">
<span class="material-symbols-outlined text-[22px]">chat</span>
</div>
</a>
</div>
</div>
</div>
</section>
</main>
</body></html>
