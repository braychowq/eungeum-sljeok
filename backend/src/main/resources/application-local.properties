spring.datasource.url=${DB_URL:jdbc:h2:file:./data/eungeum;MODE=PostgreSQL;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

auth.cookie-secure=${AUTH_COOKIE_SECURE:false}
auth.allowed-origins=${AUTH_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:3025,http://127.0.0.1:3025}
logging.level.com.eungeum.sljeok.backend.auth=DEBUG
