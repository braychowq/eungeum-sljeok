server.port=${BACKEND_PORT:8081}
spring.profiles.default=local
spring.jackson.serialization.indent_output=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
logging.level.org.springframework.web=INFO
logging.level.com.eungeum.sljeok.backend.auth=INFO

auth.public-base-url=${AUTH_PUBLIC_BASE_URL:http://localhost:3000}
auth.session-cookie-name=${AUTH_SESSION_COOKIE_NAME:EG_SESSION}
auth.session-ttl=${AUTH_SESSION_TTL:PT336H}
auth.oauth-state-ttl=${AUTH_OAUTH_STATE_TTL:PT10M}
auth.required-terms-version=${AUTH_REQUIRED_TERMS_VERSION:2026-04-04}
auth.allowed-origins=${AUTH_ALLOWED_ORIGINS:http://localhost:3000}

auth.providers.naver.client-id=${NAVER_CLIENT_ID:}
auth.providers.naver.client-secret=${NAVER_CLIENT_SECRET:}
auth.providers.naver.authorization-uri=${NAVER_AUTHORIZATION_URI:https://nid.naver.com/oauth2.0/authorize}
auth.providers.naver.token-uri=${NAVER_TOKEN_URI:https://nid.naver.com/oauth2.0/token}
auth.providers.naver.user-info-uri=${NAVER_USER_INFO_URI:https://openapi.naver.com/v1/nid/me}

auth.providers.kakao.client-id=${KAKAO_CLIENT_ID:}
auth.providers.kakao.client-secret=${KAKAO_CLIENT_SECRET:}
auth.providers.kakao.authorization-uri=${KAKAO_AUTHORIZATION_URI:https://kauth.kakao.com/oauth/authorize}
auth.providers.kakao.token-uri=${KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
auth.providers.kakao.user-info-uri=${KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}
